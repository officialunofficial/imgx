# Alpine/musl ships libvips (and its glib/gobject/etc. dependency tree) as
# shared libraries only, no static archives. Rust's *-unknown-linux-musl
# targets default to fully static linking (the "crt-static" target
# feature), which makes the linker demand -lvips.a and fail. Disabling
# crt-static here makes rustc link libc and all C deps dynamically instead,
# matching what's actually available in the Alpine package.
[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]
