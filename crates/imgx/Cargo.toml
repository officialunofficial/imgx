[package]
name = "imgx"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "imgx"
path = "src/main.rs"

[lib]
name = "imgx"
path = "src/lib.rs"

[dependencies]
imgx-vips = { path = "../imgx-vips" }
tracing = "0.1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
lru = "0.12"
parking_lot = "0.12"

