name: Build docs

# Deploys are handled by Cloudflare's own git integration (connected
# directly to this repo), not CI -- this workflow only builds the docs
# site as a check.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "vocs.config.ts"
      - "package.json"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "vocs.config.ts"
      - "package.json"
      - ".github/workflows/docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
