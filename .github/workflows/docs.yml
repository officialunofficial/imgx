name: Build docs

# Deploys are handled by Cloudflare's own git integration (connected
# directly to this repo), not CI -- this workflow only builds the docs
# site as a check.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "vocs.config.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "vocs.config.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run docs:build
